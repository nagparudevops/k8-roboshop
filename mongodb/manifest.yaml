apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongodb
  namespace: roboshop1
  # these labels are replicaset labels
  labels:
    project: roboshop1
    tier: db
    component: mongodb
spec:
  replicas: 1
  selector:
    # using these labels replica set selects the pod
    matchLabels:
      project: roboshop1
      tier: db
      component: mongodb
  # This is pod definition, pod is subset of replicaset
  template:
    metadata:
      labels:
        project: roboshop1
        tier: db
        component: mongodb
    spec:
      containers:
      - name: mongodb
        image: joindevops/mongodb:1.0.0
---
apiVersion: v1
kind: Service
metadata:
  name: mongodb
  namespace: roboshop1
  labels:
    project: roboshop1
    tier: db
    component: mongodb
spec:
  selector:
    # labels are used as selectors
    project: roboshop1
    tier: db
    component: mongodb
  ports:
  - protocol: TCP
    port: 27017 # servie port
    targetPort: 27017 # container port